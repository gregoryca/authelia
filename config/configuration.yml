    - domain: phpmyadmin.apex-migrations.net # PHP my admin panel
      policy: one_factor

    - domain: nextclouddb.gui.apex-migrations.net
      policy: one_factor

session:
  secret: 'JtTZe3UDIAg5Hvy9XeXaXWbRYhfwEJmLbbwkofQfgGoKXBPx8RxCZXTF32GIxDPR'
  cookies:
    - name: 'authelia_session'
      domain: 'apex-migrations.net'  # Should match whatever your root protected domain is
      authelia_url: 'https://auth.apex-migrations.net'
      expiration: '1 hour'  # 1 hour
